services:
  api:
    ports:
      - "3001:8000"
    build: .
    volumes:
      - ./uploads:/workspace/humandbs-assistant/uploads
      - ./results:/workspace/humandbs-assistant/results
      - .:/workspace/humandbs-assistant
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcp/service-account.json
    env_file:
      - .env
    restart: unless-stopped
    command: python -m src.app
  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    ports:
      - "3002:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - api
      - frontend
    restart: unless-stopped
