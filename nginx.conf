# Resolve the backend/frontend container addresses at request time instead of at
# startup. Under rootless podman every container recreation assigns a new IP, and a
# classic `upstream { server backend; }` block caches the IP resolved when nginx
# started -- so once the app containers are recreated (or simply start after nginx),
# every request fails with 502 "No route to host". Pairing the podman DNS resolver
# with a variable in `proxy_pass` makes nginx re-resolve the name (honoring `valid=`),
# keeping it in sync with the current container IPs.
#
# ${NGINX_RESOLVER} is substituted at container startup from the nginx container's
# /etc/resolv.conf (the podman aardvark-dns address); see nginx-entrypoint.sh.

server {
  listen 80;
  listen [::]:80;
  server_name _;
  client_max_body_size 500m;

  resolver ${NGINX_RESOLVER} valid=10s ipv6=off;

  # Timeouts
  proxy_connect_timeout 60s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  # Common proxy headers
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # /api/* -> backend (API endpoints)
  # Note: /api (without trailing slash) falls through to frontend for docs page
  location ^~ /api/ {
    set $backend_upstream "backend:8080";
    proxy_pass http://$backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  # /files/hum<4-6 digits>/* -> Joomla-era static files (NAS-backed, bind-mounted)
  # Non-hum paths under /files/ fall through to frontend.
  # Note: regex contains {N,M} so the pattern must be double-quoted for nginx.
  location ~ "^/files/hum[0-9]{4,6}(/|$)" {
    root /var/www;
    try_files $uri =404;
    add_header Cache-Control "public, max-age=3600";
    sendfile on;
    tcp_nopush on;
  }

  # / -> frontend
  location / {
    set $frontend_upstream "frontend:3000";
    proxy_pass http://$frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  "" "";
}
