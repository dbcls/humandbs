upstream backend {
  server backend:8080;
}

upstream frontend {
  server frontend:3000;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;

  # Timeouts
  proxy_connect_timeout 60s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  # Common proxy headers
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # /api/* -> backend (API endpoints)
  # Note: /api (without trailing slash) falls through to frontend for docs page
  location ^~ /api/ {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  # /files/hum<4-6 digits>/* -> Joomla-era static files (NAS-backed, bind-mounted)
  # Non-hum paths under /files/ fall through to frontend.
  # Note: regex contains {N,M} so the pattern must be double-quoted for nginx.
  location ~ "^/files/hum[0-9]{4,6}(/|$)" {
    root /var/www;
    try_files $uri =404;
    add_header Cache-Control "public, max-age=3600";
    sendfile on;
    tcp_nopush on;
  }

  # / -> frontend
  location / {
    proxy_pass http://frontend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  "" "";
}
