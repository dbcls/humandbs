services:
  cms-db:
    image: docker.io/postgres:17
    container_name: humandbs-${HUMANDBS_ENV}-cms-db
    environment:
      - TZ=${HUMANDBS_TZ}
      - POSTGRES_USER=${HUMANDBS_POSTGRES_USER}
      - POSTGRES_PASSWORD=${HUMANDBS_POSTGRES_PASSWORD:?HUMANDBS_POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${HUMANDBS_POSTGRES_DB}
    ports:
      - ${HUMANDBS_POSTGRES_BIND_PORT:-5432}:5432
    volumes:
      - cms-pgdata:/var/lib/postgresql/data:U
    networks:
      - humandbs-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${HUMANDBS_POSTGRES_USER} -d ${HUMANDBS_POSTGRES_DB}",
        ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    restart: always
    init: true

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: humandbs-${HUMANDBS_ENV}-app
    container_name: humandbs-${HUMANDBS_ENV}-frontend
    depends_on:
      cms-db:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      - TZ=${HUMANDBS_TZ}
      - HUMANDBS_ENV=${HUMANDBS_ENV}
      - NODE_ENV=${HUMANDBS_NODE_ENV}
      # Container network (fixed)
      - HUMANDBS_POSTGRES_HOST=cms-db
      - HUMANDBS_POSTGRES_PORT=5432
      - HUMANDBS_BACKEND_HOST=backend
      - HUMANDBS_BACKEND_PORT=8080
      - HUMANDBS_BACKEND_URL_PREFIX=/api
      # Server binding (fixed)
      - HUMANDBS_FRONTEND_HOST=0.0.0.0
      - HUMANDBS_FRONTEND_PORT=3000
      - HUMANDBS_FRONTEND_PUBLIC_FILES_DIR=${HUMANDBS_FRONTEND_PUBLIC_FILES_DIR:-public-files}
      - HUMANDBS_FRONTEND_PUBLIC_FILES_BASE=${HUMANDBS_FRONTEND_PUBLIC_FILES_BASE:-./data}
      - HUMANDBS_FRONTEND_DU_APPLICATION_URL=${HUMANDBS_FRONTEND_DU_APPLICATION_URL}
      # Credentials (from .env)
      - HUMANDBS_POSTGRES_USER=${HUMANDBS_POSTGRES_USER}
      - HUMANDBS_POSTGRES_PASSWORD=${HUMANDBS_POSTGRES_PASSWORD:?HUMANDBS_POSTGRES_PASSWORD is required}
      - HUMANDBS_POSTGRES_DB=${HUMANDBS_POSTGRES_DB}
      # External access (from .env)
      - HUMANDBS_AUTH_ISSUER_URL=${HUMANDBS_AUTH_ISSUER_URL}
      - HUMANDBS_AUTH_CLIENT_ID=${HUMANDBS_AUTH_CLIENT_ID}
      - HUMANDBS_AUTH_REDIRECT_URI=${HUMANDBS_AUTH_REDIRECT_URI}
    volumes:
      - .:/app:rw
      - node_modules:/app/node_modules
      - frontend_node_modules:/app/apps/frontend/node_modules
      - backend_node_modules:/app/apps/backend/node_modules
      - eslint_config_node_modules:/app/packages/eslint-config/node_modules
      # Persistent storage for uploaded public-files, kept outside the build
      # output (dist/) and out of the source tree so rebuilds never wipe it.
      - public-files-data:/app/apps/frontend/data
    working_dir: /app/apps/frontend
    networks:
      - humandbs-network
    command: ${HUMANDBS_FRONTEND_COMMAND}
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    restart: always
    init: true

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: humandbs-${HUMANDBS_ENV}-app
    container_name: humandbs-${HUMANDBS_ENV}-backend
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - TZ=${HUMANDBS_TZ}
      - HUMANDBS_ENV=${HUMANDBS_ENV}
      - NODE_ENV=${HUMANDBS_NODE_ENV}
      # Container network (fixed)
      - HUMANDBS_ES_HOST=elasticsearch
      - HUMANDBS_ES_PORT=9200
      # Server binding (fixed)
      - HUMANDBS_BACKEND_HOST=0.0.0.0
      - HUMANDBS_BACKEND_PORT=8080
      - HUMANDBS_BACKEND_URL_PREFIX=/api
      # External access (from .env)
      - HUMANDBS_AUTH_ISSUER_URL=${HUMANDBS_AUTH_ISSUER_URL}
      - HUMANDBS_AUTH_CLIENT_ID=${HUMANDBS_AUTH_CLIENT_ID}
      # JGA-shinsei DB (from .env; values stored in .claude/docs/jga-shinsei-db-access.md)
      - HUMANDBS_JGA_DB_HOST=${HUMANDBS_JGA_DB_HOST:?HUMANDBS_JGA_DB_HOST is required}
      - HUMANDBS_JGA_DB_PORT=${HUMANDBS_JGA_DB_PORT:-5432}
      - HUMANDBS_JGA_DB_USER=${HUMANDBS_JGA_DB_USER:?HUMANDBS_JGA_DB_USER is required}
      - HUMANDBS_JGA_DB_PASSWORD=${HUMANDBS_JGA_DB_PASSWORD:?HUMANDBS_JGA_DB_PASSWORD is required}
      - HUMANDBS_JGA_DB_NAME=${HUMANDBS_JGA_DB_NAME:-jgadb}
      - HUMANDBS_JGA_DB_SCHEMA=${HUMANDBS_JGA_DB_SCHEMA:-jgasys}
      # Admin UID file
      - HUMANDBS_BACKEND_ADMIN_UID_FILE=${HUMANDBS_BACKEND_ADMIN_UID_FILE:-}
      # Public files directory (for NBDC Dataset distribution links)
      - HUMANDBS_FILES_PATH=/humandbs-files
    volumes:
      - .:/app:rw
      - node_modules:/app/node_modules
      - frontend_node_modules:/app/apps/frontend/node_modules
      - backend_node_modules:/app/apps/backend/node_modules
      - eslint_config_node_modules:/app/packages/eslint-config/node_modules
      - ${HUMANDBS_FILES_DIR}:/humandbs-files:ro
    working_dir: /app/apps/backend
    networks:
      - humandbs-network
    command: ${HUMANDBS_BACKEND_COMMAND}
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    restart: always
    init: true

  assistant-api:
    build:
      context: ./apps/assistant-api
      dockerfile: Dockerfile
    container_name: humandbs-${HUMANDBS_ENV}-assistant-api
    ports:
      - 3001:8000
    environment:
      - TZ=${HUMANDBS_TZ}
      - AZURE_OPENAI_API_KEY=${ASSISTANT_AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${ASSISTANT_AZURE_OPENAI_ENDPOINT:-}
      - OPENAI_API_VERSION=${ASSISTANT_OPENAI_API_VERSION:-}
      - AZURE_OPENAI_MODEL=${ASSISTANT_AZURE_OPENAI_MODEL:-}
      - DEPLOY_MODE=${ASSISTANT_DEPLOY_MODE:-}
      - LOG_LEVEL=${ASSISTANT_LOG_LEVEL:-}
      - GOOGLE_CLOUD_API_KEY=${ASSISTANT_GOOGLE_CLOUD_API_KEY:-}
      - GOOGLE_CLOUD_PROJECT_ID=${ASSISTANT_GOOGLE_CLOUD_PROJECT_ID:-}
      - GOOGLE_CSE_ID=${ASSISTANT_GOOGLE_CSE_ID:-}
      - GOOGLE_GENAI_CACHE_ENABLED=${ASSISTANT_GOOGLE_GENAI_CACHE_ENABLED:-}
      - GOOGLE_GENAI_CACHE_DIR=${ASSISTANT_GOOGLE_GENAI_CACHE_DIR:-}
      - PLAYWRIGHT_CACHE_TTL_SECONDS=${ASSISTANT_PLAYWRIGHT_CACHE_TTL_SECONDS:-}
      - PLAYWRIGHT_CACHE_DIR=${ASSISTANT_PLAYWRIGHT_CACHE_DIR:-}
      - DOCUMENT_AI_LOCATION=${ASSISTANT_DOCUMENT_AI_LOCATION:-}
      - DOCUMENT_AI_PROCESSOR_ID=${ASSISTANT_DOCUMENT_AI_PROCESSOR_ID:-}
      - LLM_TEMPERATURE=${ASSISTANT_LLM_TEMPERATURE:-}
      - INVESTIGATE_RESEARCHER_HISTORY=${ASSISTANT_INVESTIGATE_RESEARCHER_HISTORY:-}
      - HUMANDBS_API_BASE_URL=${ASSISTANT_HUMANDBS_API_BASE_URL:-}
      - HUMANDBS_WEB_BASE_URL=${ASSISTANT_HUMANDBS_WEB_BASE_URL:-}
      - DDBJ_SEARCH_API_BASE_URL=${ASSISTANT_DDBJ_SEARCH_API_BASE_URL:-}
      - HUMANDBS_AUTH_ISSUER_URL=${ASSISTANT_HUMANDBS_AUTH_ISSUER_URL:-${HUMANDBS_AUTH_ISSUER_URL:-}}
      - HUMANDBS_AUTH_CLIENT_ID=${ASSISTANT_HUMANDBS_AUTH_CLIENT_ID:-${HUMANDBS_AUTH_CLIENT_ID:-}}
      - HUMANDBS_BACKEND_ADMIN_UID_FILE=/workspace/humandbs-assistant/admin_uids.json
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcp/service-account.json
    volumes:
      - ./apps/assistant-api:/workspace/humandbs-assistant
      - ./apps/assistant-api/gcp-service-account.json:/root/.config/gcp/service-account.json:ro
      - ${HUMANDBS_ADMIN_UID_FILE:-./admin_uids.json}:/workspace/humandbs-assistant/admin_uids.json:ro
    working_dir: /workspace/humandbs-assistant
    command: python -m src.app
    networks:
      - humandbs-network
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    restart: always
    init: true

  elasticsearch:
    build:
      context: docker/elasticsearch
    image: humandbs-elasticsearch:8.17.6-kuromoji
    container_name: humandbs-${HUMANDBS_ENV}-elasticsearch
    environment:
      - TZ=${HUMANDBS_TZ}
      - discovery.type=single-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=${HUMANDBS_ES_JAVA_OPTS}
      - path.repo=/usr/share/elasticsearch/backup
    volumes:
      - es-data:/usr/share/elasticsearch/data:U
      - ${HUMANDBS_ES_BACKUP_PATH}:/usr/share/elasticsearch/backup
    networks:
      - humandbs-network
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      memlock:
        soft: -1
        hard: -1
    mem_limit: ${HUMANDBS_ES_MEM_LIMIT}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsSL 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s'",
        ]
      interval: 5s
      retries: 12
      start_period: 10s
      timeout: 10s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    restart: always
    init: true

  nginx:
    image: docker.io/library/nginx:1.27.0
    container_name: humandbs-${HUMANDBS_ENV}-nginx
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    environment:
      - TZ=${HUMANDBS_TZ}
    volumes:
      - ./nginx.conf:/etc/nginx/default.conf.template:ro
      - ./nginx-entrypoint.sh:/nginx-entrypoint.sh:ro
      - ${HUMANDBS_FILES_DIR}:/var/www/files:ro
    # nginx-entrypoint.sh injects the podman DNS resolver into nginx.conf (so the
    # backend/frontend IPs are re-resolved at request time, avoiding stale-upstream
    # 502s) and runs the worker as root so bind-mounted lustre files stay readable.
    command: ["sh", "/nginx-entrypoint.sh"]
    ports:
      - ${HUMANDBS_NGINX_BIND_HOST}:${HUMANDBS_NGINX_PORT}:80
    networks:
      - humandbs-network
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    restart: always
    init: true

volumes:
  node_modules:
    name: humandbs-${HUMANDBS_ENV}-node-modules
  frontend_node_modules:
    name: humandbs-${HUMANDBS_ENV}-frontend-node-modules
  backend_node_modules:
    name: humandbs-${HUMANDBS_ENV}-backend-node-modules
  eslint_config_node_modules:
    name: humandbs-${HUMANDBS_ENV}-eslint-config-node-modules
  cms-pgdata:
    name: humandbs-${HUMANDBS_ENV}-cms-pgdata
  public-files-data:
    name: humandbs-${HUMANDBS_ENV}-public-files-data
  es-data:
    name: humandbs-${HUMANDBS_ENV}-es-data

networks:
  humandbs-network:
    name: humandbs-${HUMANDBS_ENV}-network
