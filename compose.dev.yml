services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: humandbs-${HUMANDBS_ENV}-keycloak
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_HOSTNAME=humandbs-${HUMANDBS_ENV}-keycloak
      - KC_HOSTNAME_PORT=8180
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      - KC_HEALTH_ENABLED=true
    command: start-dev --import-realm
    volumes:
      - ./realm.dev.json:/opt/keycloak/data/import/realm.json
    ports:
      - "8180:8080"
    networks:
      - humandbs-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/keycloak/bin/kcadm.sh config credentials --server http://localhost:8080 --realm master --user admin --password admin 2>/dev/null"]
      interval: 10s
      retries: 10
      start_period: 60s
      timeout: 10s

  keycloak-init:
    image: quay.io/keycloak/keycloak:26.1
    container_name: humandbs-${HUMANDBS_ENV}-keycloak-init
    depends_on:
      keycloak:
        condition: service_healthy
    entrypoint: >
      /bin/bash -c "
        /opt/keycloak/bin/kcadm.sh config credentials --server http://humandbs-${HUMANDBS_ENV}-keycloak:8080 --realm master --user admin --password admin &&
        /opt/keycloak/bin/kcadm.sh update realms/master -s sslRequired=NONE &&
        /opt/keycloak/bin/kcadm.sh update realms/humandbs-dev -s sslRequired=NONE
      "
    networks:
      - humandbs-network
    restart: "no"

  frontend:
    environment:
      - HUMANDBS_AUTH_ISSUER_URL=http://humandbs-${HUMANDBS_ENV}-keycloak:8080/realms/humandbs-dev
    depends_on:
      keycloak:
        condition: service_healthy

  backend:
    environment:
      - HUMANDBS_AUTH_ISSUER_URL=http://humandbs-${HUMANDBS_ENV}-keycloak:8080/realms/humandbs-dev
    depends_on:
      keycloak:
        condition: service_healthy

networks:
  humandbs-network:
    name: humandbs-${HUMANDBS_ENV}-network
