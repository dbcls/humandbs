# Podman-specific overrides.
# Usage: cp compose.override.podman.yml compose.override.yml && podman-compose up -d
#   or:  podman-compose -f compose.yml -f compose.override.podman.yml up -d

services:
  cms-db:
    userns_mode: "keep-id:uid=999,gid=999"

  frontend:
    userns_mode: "keep-id"
    volumes:
      - node_modules:/app/node_modules:U
      - frontend_node_modules:/app/apps/frontend/node_modules:U
      - backend_node_modules:/app/apps/backend/node_modules:U
      - eslint_config_node_modules:/app/packages/eslint-config/node_modules:U

  backend:
    userns_mode: "keep-id"
    volumes:
      - node_modules:/app/node_modules:U
      - frontend_node_modules:/app/apps/frontend/node_modules:U
      - backend_node_modules:/app/apps/backend/node_modules:U
      - eslint_config_node_modules:/app/packages/eslint-config/node_modules:U

  elasticsearch:
    userns_mode: "keep-id:uid=1000,gid=1000"
